services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: backend_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d backend_test"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/backend_test?sslmode=disable
      HTTP_ADDR: :8080
      SKINPORT_BASE_URL: https://api.skinport.com/v1
      SKINPORT_CACHE_TTL: 5m
      SKINPORT_TIMEOUT: 10s
      RUN_MIGRATIONS: "true"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  test:
    image: golang:1.25-alpine
    working_dir: /src
    volumes:
      - .:/src
    environment:
      TEST_DATABASE_URL: postgres://postgres:postgres@db:5432/backend_test?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - test
