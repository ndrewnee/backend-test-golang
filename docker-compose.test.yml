services:
  test-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: backend_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d backend_test"]
      interval: 5s
      timeout: 3s
      retries: 10

  test:
    image: golang:1.25-alpine
    working_dir: /src
    volumes:
      - .:/src
    environment:
      TEST_DATABASE_URL: postgres://postgres:postgres@test-db:5432/backend_test?sslmode=disable
    depends_on:
      test-db:
        condition: service_healthy
